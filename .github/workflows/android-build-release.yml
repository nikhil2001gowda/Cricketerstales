name: Android Build & Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Extract Version Name
        id: version
        run: |
          VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | awk -F'"' '{print $2}')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Sign APK
        if: github.event_name == 'push' && contains(github.event.head_commit.message, 'release')
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename APK
        if: github.event_name == 'push' && contains(github.event.head_commit.message, 'release')
        run: mv ${{ steps.sign_app.outputs.signedReleaseFile }} CricketersTales-v${{ steps.version.outputs.version_name }}.apk

      - name: Upload Signed APK
        if: github.event_name == 'push' && contains(github.event.head_commit.message, 'release')
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: CricketersTales-v${{ steps.version.outputs.version_name }}.apk

  release:
    name: Create GitHub Release
    needs: build
    if: github.event_name == 'push' && contains(github.event.head_commit.message, 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Signed APK
        uses: actions/download-artifact@v4
        with:
          name: app-release

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.apk"
          tag_name: v${{ needs.build.outputs.version_name }}
          name: "CricketersTales v${{ needs.build.outputs.version_name }}"
          body: |
            ## 🏏 CricketersTales Release v${{ needs.build.outputs.version_name }}
            
            ### 🚀 New in this version:
            - ${{ github.event.head_commit.message }}
            
            ### 🛠 Technical Changes:
            - Build Number: `${{ github.run_number }}`
            - SHA: `${{ github.sha }}`
            
            ---
            *Automated release generated by GitHub Actions.*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
